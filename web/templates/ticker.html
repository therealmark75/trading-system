<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalIntel — {{ ticker }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:#080c14;--surface:#0d1520;--surface2:#111d2e;--border:#1a2d45;
            --accent:#00d4ff;--accent2:#00ff88;--warning:#ff9500;--danger:#ff3b5c;--purple:#af52de;
            --text:#f0f6ff;--muted:#8aa4bf;--muted2:#c2d4e8;
            --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;
            background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
            linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
            background-size:40px 40px;}
        header{position:sticky;top:0;z-index:100;background:rgba(8,12,20,0.95);
            backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
            padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;}
        .logo{font-family:var(--mono);font-size:15px;color:var(--accent);letter-spacing:2px;
            text-transform:uppercase;text-decoration:none;}
        .logo span{color:var(--accent2);}
        .header-right{display:flex;align-items:center;gap:12px;}
        .btn-back{padding:6px 14px;border-radius:4px;border:1px solid var(--border);
            background:transparent;color:var(--muted2);font-family:var(--mono);font-size:11px;
            cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.15s;}
        .btn-back:hover{border-color:var(--accent);color:var(--accent);}
        .btn-wl{padding:6px 14px;border-radius:4px;border:none;font-family:var(--mono);
            font-size:11px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
        .btn-add{background:var(--accent2);color:var(--bg);}
        .btn-remove{background:var(--danger);color:white;}
        .btn-add:hover,.btn-remove:hover{opacity:0.85;}

        main{max-width:1400px;margin:0 auto;padding:24px;}

        /* Hero */
        .hero{display:flex;align-items:flex-start;justify-content:space-between;
            margin-bottom:28px;flex-wrap:wrap;gap:16px;}
        .ticker-name{font-family:var(--mono);font-size:48px;font-weight:700;color:var(--accent);line-height:1;}
        .company-name{font-size:18px;color:var(--muted2);margin-top:6px;font-weight:400;}
        .hero-badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
        .badge{padding:4px 12px;border-radius:4px;font-family:var(--mono);font-size:11px;
            border:1px solid var(--border);color:var(--muted2);}
.badge-link{text-decoration:none;cursor:pointer;transition:all 0.15s;}
.badge-link:hover{border-color:var(--accent);color:var(--accent);}
        .hero-right{text-align:right;}
        .price-big{font-family:var(--mono);font-size:40px;font-weight:700;}
        .price-change{font-family:var(--mono);font-size:16px;margin-top:4px;}

        /* Signal banner */
        .signal-banner{background:var(--surface);border:1px solid var(--border);
            border-radius:10px;padding:20px;margin-bottom:20px;
            display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
        .signal-rating-big{padding:6px 18px;border-radius:6px;font-family:var(--mono);
            font-size:14px;font-weight:700;letter-spacing:1px;}
        .rating-BUY{background:rgba(0,212,255,0.15);color:#00d4ff;border:1px solid rgba(0,212,255,0.3);}
        .rating-STRONG_BUY{background:rgba(0,255,136,0.15);color:#00ff88;border:1px solid rgba(0,255,136,0.3);}
        .rating-WATCH{background:rgba(255,149,0,0.1);color:#ff9500;border:1px solid rgba(255,149,0,0.2);}
        .rating-REVERSION{background:rgba(175,82,222,0.12);color:#af52de;border:1px solid rgba(175,82,222,0.25);}
        .rating-AVOID,.rating-SHORT_WATCH,.rating-STRONG_SELL{background:rgba(255,59,92,0.1);color:#ff3b5c;border:1px solid rgba(255,59,92,0.2);}
        .signal-scores{display:flex;gap:20px;flex-wrap:wrap;}
        .score-item{text-align:center;}
        .score-item-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;
            letter-spacing:1px;color:var(--muted2);margin-bottom:4px;}
        .score-item-value{font-family:var(--mono);font-size:20px;font-weight:700;}

        /* TradingView chart */
        .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
            overflow:hidden;margin-bottom:16px;}
        .chart-header{padding:14px 20px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
        .chart-header:hover .chart-chevron{color:var(--accent);}
        .chart-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;
            letter-spacing:2px;color:var(--muted2);}
        .chart-intervals{display:flex;gap:4px;}
        .interval-btn{padding:3px 8px;border-radius:3px;font-family:var(--mono);font-size:10px;
            cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted2);transition:all 0.15s;}
        .interval-btn:hover,.interval-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.08);}
        #tv-chart-container{height:480px;width:100%;}

        /* Grid layout */
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
        .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
        @media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr;}.hero{flex-direction:column;}.hero-right{text-align:left;}}

        /* Cards */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
        .card-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;
            letter-spacing:2px;color:var(--muted2);margin-bottom:16px;
            padding-bottom:10px;border-bottom:1px solid var(--border);}
        .stat-row{display:flex;justify-content:space-between;align-items:center;
            padding:8px 0;border-bottom:1px solid rgba(26,45,69,0.4);}
        .stat-row:last-child{border-bottom:none;}
        .stat-row-label{color:var(--muted2);font-size:13px;}
        .stat-row-value{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);}

        /* Score bars */
        .score-bar-row{margin-bottom:12px;}
        .score-bar-header{display:flex;justify-content:space-between;margin-bottom:6px;}
        .score-bar-label{font-size:12px;color:var(--muted2);}
        .score-bar-num{font-family:var(--mono);font-size:12px;font-weight:700;}
        .bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
        .bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease;}

        /* Tables */
        .table-wrap{overflow:hidden;border-radius:8px;border:1px solid var(--border);}
        table{width:100%;border-collapse:collapse;}
        th{background:var(--surface2);padding:8px 12px;text-align:left;
            font-family:var(--mono);font-size:9px;text-transform:uppercase;
            letter-spacing:1px;color:var(--muted2);border-bottom:1px solid var(--border);}
        td{padding:8px 12px;border-bottom:1px solid rgba(26,45,69,0.4);font-size:13px;color:var(--text);}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(0,212,255,0.03);}

        /* External links */
        .ext-links{display:flex;gap:10px;flex-wrap:wrap;}
        .ext-link{padding:8px 16px;border-radius:6px;border:1px solid var(--border);
            color:var(--muted2);text-decoration:none;font-family:var(--mono);font-size:11px;
            transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
        .ext-link:hover{border-color:var(--accent);color:var(--accent);}

        /* News */
        .news-item{padding:12px 0;border-bottom:1px solid rgba(26,45,69,0.4);}
        .news-item:last-child{border-bottom:none;}
        .news-headline{font-size:13px;margin-bottom:4px;line-height:1.4;}
        .news-headline a{color:var(--text);text-decoration:none;}
        .news-headline a:hover{color:var(--accent);}
        .news-meta{display:flex;gap:12px;font-size:11px;color:var(--muted2);font-family:var(--mono);}
        .sent-pos{color:var(--accent2);}
        .sent-neg{color:var(--danger);}
        .sent-neu{color:var(--muted2);}

        .hi{color:var(--accent2)}.mid{color:var(--accent)}.lo{color:var(--warning)}.bad{color:var(--danger)}

        .loading{text-align:center;padding:40px;color:var(--muted2);font-family:var(--mono);font-size:12px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .rating-tooltip-wrap { position: relative; display: inline-block; }
    .rating-tooltip {
        display: none;
        position: absolute;
        top: 110%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        z-index: 100;
        width: 220px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .rating-tooltip-wrap:hover .rating-tooltip { display: block; }
    .rt-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .rt-badge { font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
    .rt-desc { font-size: 11px; color: var(--muted2); }

    ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:var(--bg);}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    
.score-q{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;
    border-radius:50%;border:1px solid var(--muted);color:var(--muted);font-size:9px;
    cursor:help;margin-left:3px;vertical-align:middle;}
.score-q:hover{border-color:var(--accent);color:var(--accent);}

/* Widget collapse/expand */
.card-title{cursor:pointer;user-select:none;}
.card-title:hover .chevron{color:var(--accent);}
.chevron{margin-left:auto;font-size:11px;color:var(--muted);transition:transform 0.2s;display:inline-block;padding-left:8px;}
.card-collapsed .chevron{transform:rotate(-90deg);}
.card-body{overflow:hidden;transition:max-height 0.25s ease,opacity 0.2s ease;max-height:2000px;opacity:1;}
.card-collapsed .card-body{max-height:0;opacity:0;pointer-events:none;}
.page-toolbar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:14px;}
.btn-collapse-all{padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all 0.15s;}
.btn-collapse-all:hover{border-color:var(--accent);color:var(--accent);}

/* Event Feed Timeline */
.event-feed{margin-bottom:20px;}
.event-feed-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:2px;color:var(--muted2);margin-bottom:14px;padding-bottom:10px;
    border-bottom:1px solid var(--border);}
.event-item{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid rgba(26,45,69,0.4);}
.event-item:last-child{border-bottom:none;}
.event-spine{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0;}
.event-dot{width:10px;height:10px;border-radius:50%;border:2px solid;flex-shrink:0;margin-top:3px;}
.event-line{width:2px;flex:1;min-height:12px;background:rgba(26,45,69,0.6);margin-top:4px;}
.event-item:last-child .event-line{display:none;}
.event-body{flex:1;}
.event-title{font-size:13px;color:var(--text);line-height:1.4;}
.event-detail{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-top:3px;}
.event-date{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;}
.event-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-family:var(--mono);
    font-size:9px;font-weight:700;text-transform:uppercase;margin-right:6px;vertical-align:middle;}
.event-tag-rating{background:rgba(0,212,255,0.1);color:#00d4ff;border:1px solid rgba(0,212,255,0.2);}
.event-tag-insider{background:rgba(175,82,222,0.1);color:#af52de;border:1px solid rgba(175,82,222,0.2);}
.event-tag-legal{background:rgba(255,149,0,0.1);color:#ff9500;border:1px solid rgba(255,149,0,0.2);}
.event-tag-earnings{background:rgba(250,204,21,0.1);color:#facc15;border:1px solid rgba(250,204,21,0.2);}

/* Hexagon Scorecard */
.radar-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
.radar-canvas-wrap{position:relative;width:280px;height:280px;flex-shrink:0;}
.radar-canvas-wrap canvas{position:absolute;top:0;left:0;}
.radar-legend{flex:1;min-width:200px;}
.radar-legend-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:2px;color:var(--muted2);margin-bottom:14px;padding-bottom:8px;
    border-bottom:1px solid var(--border);}
.radar-dim{display:flex;align-items:center;justify-content:space-between;
    padding:7px 0;border-bottom:1px solid rgba(26,45,69,0.4);}
.radar-dim:last-child{border-bottom:none;}
.radar-dim-name{font-family:var(--mono);font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:6px;}
.radar-dim-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.radar-dim-score{font-family:var(--mono);font-size:14px;font-weight:700;}
.radar-center-score{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;pointer-events:none;}
.radar-center-num{font-family:var(--mono);font-size:22px;font-weight:700;}
.radar-center-lbl{font-family:var(--mono);font-size:8px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;}

.ticker-sub-bar{display:flex;align-items:center;gap:12px;padding:8px 24px;border-bottom:1px solid var(--border);background:rgba(8,12,20,0.8);}
.ticker-sub-bar a,.ticker-sub-bar button{font-family:var(--mono);font-size:11px;}
</style>
</head>
<body>
{% include '_nav.html' %}
<div class="ticker-sub-bar">
    {% if from_page in ('penny', 'penny_screener') %}
    <a href="/penny" class="btn-back">← Back to Penny Hub</a>
    {% else %}
    <a href="/" class="btn-back">← Back to Dashboard</a>
    {% endif %}
    <button id="wl-btn" class="btn-wl btn-add" onclick="toggleWatchlist()">+ Watchlist</button>
</div>

<main>
    <div class="page-toolbar" id="page-toolbar" style="display:none">
        <button class="btn-collapse-all" id="btn-collapse-all" onclick="toggleAllCards()">Collapse All</button>
    </div>
    <div id="page-content">
        <div style="text-align:center;padding:60px;color:var(--muted2);font-family:var(--mono)">
            <div style="display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px"></div>
            <div>Loading {{ ticker }}...</div>
        </div>
    </div>
</main>

<!-- TradingView widget script -->
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
const TICKER = '{{ ticker }}';
let inWatchlist = false;
let tvWidget = null;
let currentInterval = 'D';


function fmtDate(d) {
    if(!d) return '-';
    // Handle "Mon-DD-YY" style from Yahoo e.g. "Wed, 13 Au"
    // Try standard parse first
    const dt = new Date(d);
    if(!isNaN(dt)) return dt.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'2-digit'});
    // Strip day-of-week prefix if present e.g. "Wed, 13 Aug 2025"
    const clean = d.replace(/^[A-Za-z]+,\s*/, '');
    const dt2 = new Date(clean);
    if(!isNaN(dt2)) return dt2.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'2-digit'});
    // Try parsing as-is after stripping day prefix
    const parts = d.replace(/^[A-Za-z]+,\s*/, '').split(' ');
    if(parts.length >= 3) {
        const attempt = parts.slice(0,3).join(' ');
        const dt3 = new Date(attempt);
        if(!isNaN(dt3)) return dt3.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'2-digit'});
    }
    return d.substring(0,10);
}
function scoreC(s) {
    if(s==null) return 'mid';
    return s>=70?'hi':s>=55?'mid':s>=45?'lo':'bad';
}
function barC(s) {
    return s>=70?'#00ff88':s>=55?'#00d4ff':s>=45?'#ff9500':'#ff3b5c';
}
function fmt(v,d=2) { return v==null?'-':Number(v).toFixed(d); }
function fmtP(v) { return v==null?'-':(v>=0?'+':'')+Number(v).toFixed(2)+'%'; }
function fmtMktCap(v) {
    if(v==null) return '-';
    v = parseFloat(v);
    if(isNaN(v)) return '-';
    if(Math.abs(v)>=1e12) return '$'+(v/1e12).toFixed(2)+'T';
    if(Math.abs(v)>=1e9) return '$'+(v/1e9).toFixed(2)+'B';
    if(Math.abs(v)>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
    if(Math.abs(v)>=1e3) return '$'+(v/1e3).toFixed(0)+'K';
    return '$'+Number(v).toFixed(0);
}
function fmtK(v) {
    if(v==null) return '-';
    if(Math.abs(v)>=1e9) return '$'+(v/1e9).toFixed(1)+'B';
    if(Math.abs(v)>=1e6) return '$'+(v/1e6).toFixed(1)+'M';
    if(Math.abs(v)>=1e3) return '$'+(v/1e3).toFixed(0)+'K';
    return '$'+Number(v).toFixed(0);
}

function initTradingViewChart(symbol, interval) {
    currentInterval = interval || 'D';
    const container = document.getElementById('tv-chart-container');
    if(!container) return;
    container.innerHTML = '';

    // Update interval button states
    document.querySelectorAll('.interval-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.interval === currentInterval);
    });

    tvWidget = new TradingView.widget({
        autosize: true,
        symbol: symbol,
        interval: currentInterval,
        timezone: 'Etc/UTC',
        theme: 'dark',
        style: '1',
        locale: 'en',
        toolbar_bg: '#0d1520',
        enable_publishing: false,
        hide_top_toolbar: false,
        hide_legend: false,
        save_image: false,
        container_id: 'tv-chart-container',
        backgroundColor: '#080c14',
        gridColor: 'rgba(26,45,69,0.5)',
        studies: [
            'RSI@tv-basicstudies',
            'MASimple@tv-basicstudies'
        ],
        overrides: {
            'mainSeriesProperties.candleStyle.upColor': '#00ff88',
            'mainSeriesProperties.candleStyle.downColor': '#ff3b5c',
            'mainSeriesProperties.candleStyle.borderUpColor': '#00ff88',
            'mainSeriesProperties.candleStyle.borderDownColor': '#ff3b5c',
            'mainSeriesProperties.candleStyle.wickUpColor': '#00ff88',
            'mainSeriesProperties.candleStyle.wickDownColor': '#ff3b5c',
        }
    });
}

async function toggleWatchlist() {
    const btn = document.getElementById('wl-btn');
    if(inWatchlist) {
        const res = await fetch('/api/watchlist/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker:TICKER})});
        const d = await res.json();
        if (d.ok) {
            inWatchlist = false;
            btn.textContent = '+ Watchlist';
            btn.className = 'btn-wl btn-add';
            if (window.showWlToast) showWlToast(TICKER, true);
        }
    } else {
        const res = await fetch('/api/watchlist/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker:TICKER})});
        const d = await res.json();
        if (d.ok) {
            inWatchlist = true;
            btn.textContent = '✓ In Watchlist';
            btn.className = 'btn-wl btn-remove';
            if (window.showWlToast) showWlToast(TICKER, false);
        }
    }
}

async function loadPage() {
    const data = await fetch(`/api/ticker/${TICKER}`).then(r=>r.json());
    const s  = data.signal     || {};
    const sc = data.screener   || {};
    const lr = data.legal_risk || {risk_label:'No data', risk_color:'#6b7280', penalty:0, risk_level:'NONE'};
    inWatchlist = data.in_watchlist || false;

    const wlBtn = document.getElementById('wl-btn');
    if(inWatchlist) {
        wlBtn.textContent = '✓ In Watchlist';
        wlBtn.className = 'btn-wl btn-remove';
    }

    const chg = sc.change_pct || 0;
    const priceC = chg >= 0 ? 'var(--accent2)' : 'var(--danger)';

    let earningsBadge = '';
    if (data.next_earnings_date) {
        const daysUntil = Math.ceil((new Date(data.next_earnings_date) - new Date()) / 86400000);
        if (daysUntil >= 0 && daysUntil <= 14) {
            const urgency = daysUntil <= 3 ? '#ff3b5c' : daysUntil <= 7 ? '#ff9500' : '#00d4ff';
            earningsBadge = `<div style="margin-top:6px;display:inline-block;background:${urgency}18;border:1px solid ${urgency}55;border-radius:4px;padding:3px 8px;font-family:var(--mono);font-size:10px;font-weight:700;color:${urgency}">⚡ EARNINGS IN ${daysUntil === 0 ? 'TODAY' : daysUntil + 'd'}</div>`;
        }
    }

    const lrSign = (lr.penalty||0) > 0 ? '+' : '';
    const scoreBars = [
        {label:'Momentum',  val:s.momentum_score},

    }).join('') || '<div style="color:var(--muted2);padding:20px;font-family:var(--mono);font-size:12px">No recent news available for this ticker.</div>';

    const histRows = (data.history||[]).slice(-10).reverse().map(h => {
        const c = h.rating === 'BUY' || h.rating === 'STRONG_BUY' ? 'var(--accent2)' :

        return `<tr>
            <td style="font-family:var(--mono);color:var(--muted2);font-size:11px">${fmtDate(h.date)}</td>
            <td style="color:${c};font-family:var(--mono);font-size:11px;font-weight:700">${h.rating||'-'}</td>
            <td style="font-family:var(--mono);font-size:12px">${fmt(h.composite_score,1)}</td>

    document.getElementById('page-content').innerHTML = `
        <!-- Hero -->
        <div class="hero">
            <div class="hero-left">
                <div class="ticker-name">${TICKER}</div>
                <div class="company-name">${sc.company || sc.industry || ''}</div>

                ${sc.sector ? `<a href="/?tab=sectors" class="badge badge-link">${sc.sector}</a>` : ''}

                    ${sc.country ? `<span class="badge">${(()=>{const flags={'USA':'🇺🇸','UK':'🇬🇧','Canada':'🇨🇦','Germany':'🇩🇪','Japan':'🇯🇵','China':'🇨🇳','Australia':'🇦🇺','France':'🇫🇷'};return (flags[sc.country]||'')+ ' '+sc.country;})()} </span>` : ''}

            </div>
            <div class="hero-right">
                <div class="price-big" style="color:${priceC}">$${fmt(sc.price,2)}</div>
                <div class="price-change" style="color:${priceC}">${fmtP(sc.change_pct)} today</div>
                ${(()=>{ if(s.target_price){const tu=s.target_upside||0;const tc=tu>=0?'#00ff88':'#ff3b5c';return `<div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px">12-MONTH TARGET: <span style="color:var(--text);font-weight:700">$${fmt(s.target_price,2)}</span> <span style="color:${tc};font-weight:700">(${tu>=0?'+':''}${fmt(tu,1)}%)</span></div>`;}return `<div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px">12-MONTH TARGET: <span style="color:var(--muted)">pending</span></div>`})()}
                ${earningsBadge}
                <div class="ext-links" style="margin-top:12px;justify-content:flex-end">
                    <a href="https://finviz.com/quote.ashx?t=${TICKER}" target="_blank" class="ext-link">FinViz ↗</a>
                    <a href="https://finance.yahoo.com/quote/${TICKER}" target="_blank" class="ext-link">Yahoo Finance ↗</a>
                    <a href="https://www.tradingview.com/chart/?symbol=${TICKER}" target="_blank" class="ext-link">TradingView ↗</a>
                </div>
            </div>
        </div>

        <!-- Signal banner -->
        <div class="signal-banner">
            <div>
                <div style="font-family:var(--mono);font-size:10px;color:var(--muted2);margin-bottom:8px">SIGNAL RATING</div>
                <div class="rating-tooltip-wrap">
                    <span class="signal-rating-big rating-${s.rating||'WATCH'}">${s.rating||'WATCH'} ⓘ</span>
                    <div class="rating-tooltip">
                        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px">RATING GUIDE</div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(0,255,136,0.15);color:#00ff88">STRONG BUY</span><span class="rt-desc">Highest conviction long</span></div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(0,212,255,0.15);color:#00d4ff">BUY</span><span class="rt-desc">Positive signal, enter</span></div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(148,163,184,0.15);color:#94a3b8">STRONG HOLD</span><span class="rt-desc">Good, no new entry</span></div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(100,116,139,0.15);color:#64748b">HOLD</span><span class="rt-desc">Neutral, watch closely</span></div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(255,149,0,0.15);color:#ff9500">WEAK HOLD</span><span class="rt-desc">Deteriorating, reduce</span></div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(255,59,92,0.15);color:#ff3b5c">SELL</span><span class="rt-desc">Exit position</span></div>
                        <div class="rt-row"><span class="rt-badge" style="background:rgba(255,59,92,0.25);color:#ff3b5c">STRONG SELL</span><span class="rt-desc">High conviction short</span></div>

                </div>
            </div>
            <div style="font-family:var(--mono)" data-tip="Overall SignalIntel score 0-100 combining all five components. Determines the 7-tier signal rating">
                <div style="font-size:10px;color:var(--muted2);margin-bottom:4px">COMPOSITE SCORE</div>
                <div style="font-size:36px;font-weight:700;color:${barC(s.composite_score||0)}">${fmt(s.composite_score,1)}</div>
            </div>
            ${s.target_price ? (()=>{ const tu=s.target_upside||0; return `<div style="font-family:var(--mono);border-left:1px solid var(--border);padding-left:20px" data-tip="12-month price target combining DCF fair value (40%), analyst consensus (35%), technical projection (15%), and quality/legal adjustment (10%). Re-calculated daily. Past performance does not guarantee future returns.">
                <div style="font-size:10px;color:var(--muted2);margin-bottom:4px">12-MONTH TARGET <span style="font-size:9px;cursor:help" title="12-month price target combining DCF fair value (40%), analyst consensus (35%), technical projection (15%), and quality/legal adjustment (10%). Re-calculated daily. Past performance does not guarantee future returns.">(?)</span></div>
                <div style="font-size:28px;font-weight:700;color:var(--text)">$${fmt(s.target_price,2)}</div>
                <div style="font-size:12px;font-weight:700;margin-top:2px;color:${tu>=0?'#00ff88':'#ff3b5c'}">${tu>=0?'+'+fmt(tu,1)+'% upside':fmt(Math.abs(tu),1)+'% downside'}</div>
            </div>`; })() : ''}
            <div class="signal-scores">
                <div class="score-item" data-tip="Measures price trend strength, RSI momentum and moving average signals. High score = strong upward momentum"><div class="score-item-label">Momentum</div><div class="score-item-value ${scoreC(s.momentum_score)}">${fmt(s.momentum_score,1)}</div></div>
                <div class="score-item" data-tip="Fundamental quality score based on P/E ratio vs sector average, EPS growth and return on equity"><div class="score-item-label">Quality</div><div class="score-item-value ${scoreC(s.quality_score)}">${fmt(s.quality_score,1)}</div></div>
                <div class="score-item" data-tip="Insider activity score based on recent buying and selling by company directors, officers and major shareholders. 100 = strong cluster buying"><div class="score-item-label">Insider</div><div class="score-item-value ${scoreC(s.insider_score)}">${fmt(s.insider_score,1)}</div></div>
                <div class="score-item" data-tip="Mean reversion signal. Low score = price has moved far from average and may revert. High = trending strongly"><div class="score-item-label">Reversion</div><div class="score-item-value ${scoreC(s.reversion_score)}">${fmt(s.reversion_score,1)}</div></div>
                <div class="score-item" data-tip="SEC EDGAR legal risk assessment. Penalises composite score for active enforcement actions, investigations or class actions"><div class="score-item-label">Legal</div><div class="score-item-value" style="color:${lr.risk_color}">${lr.risk_label}</div></div>
            </div>
        </div>


        <!-- Hexagon Scorecard -->
        <div class="radar-card">
            <div class="radar-canvas-wrap">
                <canvas id="radar-chart" width="280" height="280"></canvas>
                <div class="radar-center-score">
                    <div class="radar-center-num" id="radar-center-num" style="color:#00d4ff">-</div>
                    <div class="radar-center-lbl">composite</div>

            <div class="radar-legend">
                <div class="radar-legend-title">SignalIntel Scorecard</div>
                <div class="radar-dim">
                    <div class="radar-dim-name"><div class="radar-dim-dot" style="background:#00d4ff"></div>Momentum</div>
                    <div class="radar-dim-score hi" id="rd-momentum">-</div>
                </div>
                <div class="radar-dim">
                    <div class="radar-dim-name"><div class="radar-dim-dot" style="background:#00ff88"></div>Quality</div>
                    <div class="radar-dim-score hi" id="rd-quality">-</div>
                </div>
                <div class="radar-dim">
                    <div class="radar-dim-name"><div class="radar-dim-dot" style="background:#af52de"></div>Insider</div>
                    <div class="radar-dim-score hi" id="rd-insider">-</div>
                </div>
                <div class="radar-dim">
                    <div class="radar-dim-name"><div class="radar-dim-dot" style="background:#facc15"></div>Reversion</div>
                    <div class="radar-dim-score hi" id="rd-reversion">-</div>
                </div>
                <div class="radar-dim">
                    <div class="radar-dim-name"><div class="radar-dim-dot" style="background:#ff9500"></div>Legal</div>
                    <div class="radar-dim-score" id="rd-legal">-</div>
                </div>
                <div class="radar-dim">
                    <div class="radar-dim-name"><div class="radar-dim-dot" style="background:#ff6b35"></div>Value</div>
                    <div class="radar-dim-score hi" id="rd-value">-</div>
                </div>
            </div>
        </div>

        <!-- Fair Value + Analyst + Technical Summary -->
        <div class="grid-3" id="insights-row" style="margin-bottom:16px">

            <!-- Fair Value -->
            <div class="card" id="fv-card">
                <div class="card-title">Fair Value Estimate</div>
                <div id="fv-content" style="text-align:center;padding:12px 0">
                    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px">ESTIMATED FAIR VALUE</div>
                    <div id="fv-price" style="font-size:32px;font-weight:700;font-family:var(--mono)">-</div>
                    <div id="fv-badge" style="margin:8px 0;font-size:11px;font-family:var(--mono);font-weight:700;padding:4px 12px;border-radius:4px;display:inline-block">-</div>
                    <div id="fv-discount" style="font-size:12px;color:var(--muted2)">vs current price</div>
                    <div style="font-size:10px;color:var(--muted);margin-top:8px">Based on P/E vs sector average</div>
                </div>
            </div>

            <!-- Analyst Consensus -->
            <div class="card" id="analyst-card">
                <div class="card-title">Analyst Consensus</div>
                <div id="analyst-content" style="text-align:center;padding:12px 0">
                    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px">RECOMMENDATION</div>
                    <div id="analyst-gauge" style="margin:0 auto 12px;width:80px;height:80px;border-radius:50%;border:4px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700">-</div>
                    <div id="analyst-label" style="font-size:11px;color:var(--muted2)">No analyst data</div>
                    <div style="font-size:10px;color:var(--muted);margin-top:8px">Scale: 1=Strong Buy 5=Strong Sell</div>
                    <div id="analyst-freshness" style="font-size:10px;color:var(--muted);margin-top:4px"></div>
                </div>
            </div>

            <!-- Technical Summary -->
            <div class="card" id="tech-summary-card">
                <div class="card-title">Technical Summary</div>
                <div id="tech-summary-content">
                    <div style="display:flex;justify-content:center;gap:16px;margin-bottom:12px">

                            <div id="ts-buy" style="font-family:var(--mono);font-size:24px;font-weight:700;color:var(--accent2)">-</div>
                            <div style="font-size:10px;color:var(--muted)">BUY</div>
                        </div>
                        <div style="text-align:center">
                            <div id="ts-neutral" style="font-family:var(--mono);font-size:24px;font-weight:700;color:var(--muted2)">-</div>

                        </div>
                        <div style="text-align:center">
                            <div id="ts-sell" style="font-family:var(--mono);font-size:24px;font-weight:700;color:var(--danger)">-</div>
                            <div style="font-size:10px;color:var(--muted)">SELL</div>

                    </div>
                    <div id="ts-overall" style="text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;padding:6px;border-radius:4px;margin-bottom:10px">-</div>
                    <div id="ts-signals" style="font-size:11px"></div>
                </div>
            </div>
        </div>

        <!-- Legal & Regulatory Risk Card -->
        <div class="card" id="legal-risk-card">

                <a href="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK={{ ticker }}&type=&dateb=&owner=include&count=10" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;margin-left:auto;margin-right:4px;">SEC EDGAR ↗</a>

                <span style="width:8px;height:8px;border-radius:50%;background:{{ lr.risk_color }};flex-shrink:0;"></span>

                <span style="font-weight:600;min-width:32px;text-align:right;color:{% if lr.penalty < 0 %}#ef4444{% elif lr.penalty > 0 %}#22c55e{% else %}var(--muted){% endif %};">{% if lr.penalty > 0 %}+{% endif %}{{ lr.penalty }}</span>

                    <button class="interval-btn" data-interval="D" onclick="initTradingViewChart('${TICKER}','D')">1D</button>

            <div id="tv-chart-container"></div>

                <div class="card-title">Score Breakdown</div>

        <div class="grid-3">
            <div class="card">
                <div class="card-title">Technical</div>
                <div class="stat-row" data-tip="Relative Strength Index — below 30 = oversold (buy signal), above 70 = overbought (sell signal). Below 30 = oversold (potential buy). Above 70 = overbought (potential sell). 50 = neutral."><span class="stat-row-label">RSI (14)</span><span class="stat-row-value ${(sc.rsi_14||50)>70?'bad':(sc.rsi_14||50)<30?'hi':'mid'}">${fmt(sc.rsi_14,1)}</span></div>
                <div class="stat-row" data-tip="50-day moving average. Price above = bullish trend. Positive = price above trend (bullish). Negative = price below trend (bearish)."><span class="stat-row-label">50-Day SMA</span><span class="stat-row-value" style="color:${(sc.sma_50_pct||0)>=0?'var(--accent2)':'var(--danger)'}">${fmtP(sc.sma_50_pct)}</span></div>
                <div class="stat-row" data-tip="200-day moving average. Price above = long-term bullish trend. The long-term trend indicator. Positive = long-term bullish."><span class="stat-row-label">200-Day SMA</span><span class="stat-row-value" style="color:${(sc.sma_200_pct||0)>=0?'var(--accent2)':'var(--danger)'}">${fmtP(sc.sma_200_pct)}</span></div>
                <div class="stat-row" data-tip="Relative volume vs average. Above 1.5x = unusual activity. Above 1.5x = unusual activity, possible catalyst. Below 0.5x = low interest."><span class="stat-row-label">Rel. Volume</span><span class="stat-row-value">${fmt(sc.rel_volume,2)}x</span></div>
                <div class="stat-row" data-tip="Beta measures volatility vs the market. Above 1 = more volatile than market. Below 1 = more stable. Negative = moves inversely."><span class="stat-row-label">Beta</span><span class="stat-row-value">${fmt(sc.beta,2)}</span></div>
            </div>
            <div class="card">
                <div class="card-title">52-Week Range</div>
                <div class="stat-row" data-tip="% below 52-week high. Near 0% = at yearly peak. Near 0% = trading at or near its yearly peak. More negative = further from high."><span class="stat-row-label">vs 52W High</span><span class="stat-row-value" style="color:${(sc.high_52w_pct||0)>-5?'var(--accent2)':'var(--muted2)'}">${fmtP(sc.high_52w_pct)}</span></div>
                <div class="stat-row" data-tip="% above 52-week low. Higher = stronger recovery from yearly floor. Higher = stronger recovery from its yearly floor. +50% means trading 50% above its lowest point."><span class="stat-row-label">vs 52W Low</span><span class="stat-row-value" style="color:${(sc.low_52w_pct||0)<10?'var(--purple)':'var(--muted2)'}">${fmtP(sc.low_52w_pct)}</span></div>
                <div class="stat-row"><span class="stat-row-label">Avg Volume</span><span class="stat-row-value">${sc.avg_volume?Number(sc.avg_volume).toLocaleString():'-'}</span></div>
            </div>
            <div class="card">
                <div class="card-title">Short Data</div>
                <div class="stat-row"><span class="stat-row-label">Short Interest</span><span class="stat-row-value" style="color:${(sc.short_interest_pct||0)>20?'var(--danger)':(sc.short_interest_pct||0)>10?'var(--warning)':'var(--text)'}">${fmtP(sc.short_interest_pct)}</span></div>
                <div class="stat-row"><span class="stat-row-label">Insider Ownership</span><span class="stat-row-value">${fmtP(sc.insider_own_pct)}</span></div>
                <div class="stat-row"><span class="stat-row-label">Insider Transactions</span><span class="stat-row-value">${sc.insider_transactions||'-'}</span></div>
            </div>
        </div>

        <!-- Insider activity -->
        <div class="card" style="margin-bottom:16px">
            <div class="card-title">Insider Activity</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Date</th><th>Insider</th><th>Title</th><th>Type</th><th>Price</th><th>Value</th></tr></thead>
                    <tbody>${insiderRows}</tbody>
                </table>
            </div>
        </div>

        <!-- Event Feed -->
        <div class="card" style="margin-bottom:16px" id="event-feed-card">
            <div class="event-feed">
                <div class="event-feed-title">Recent Events</div>
                <div id="event-feed-body">
                    <div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:12px 0">Loading events…</div>
                </div>
            </div>
        </div>

        <!-- Signal history + News -->
        <div class="grid-2">
            <div class="card">
                <div class="card-title">Signal History</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Date</th><th>Rating</th><th>Score</th></tr></thead>
                        <tbody>${histRows}</tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <div class="card-title">Recent News</div>
                ${newsItems}
            </div>
        </div>
    `;

    // Init chart after DOM is ready
    // Detect fund/ETF/REIT — these don't have P/E-based fair value or analyst consensus
    const isFund = sc.industry && /Fund|ETF|Trust|REIT/i.test(sc.industry);

    // Fair Value
    const fv = data.fair_value;
    if (fv && fv.estimated) {
        document.getElementById('fv-price').textContent = '$' + fv.estimated.toFixed(2);
        const disc = fv.discount_pct;
        const badge = document.getElementById('fv-badge');
        const discEl = document.getElementById('fv-discount');
        badge.textContent = fv.label;
        discEl.textContent = (disc >= 0 ? '+' : '') + disc + '% vs current price';
        if (fv.label === 'UNDERVALUED') {
            badge.style.background='rgba(0,255,136,0.15)'; badge.style.color='#00ff88'; discEl.style.color='#00ff88';
        } else if (fv.label === 'OVERVALUED') {
            badge.style.background='rgba(255,59,92,0.15)'; badge.style.color='#ff3b5c'; discEl.style.color='#ff3b5c';
        } else {
            badge.style.background='rgba(0,212,255,0.15)'; badge.style.color='#00d4ff';
        }
    } else if (isFund) {
        const badge = document.getElementById('fv-badge');
        badge.textContent = 'FUND/ETF';
        badge.style.background='rgba(148,163,184,0.1)'; badge.style.color='#94a3b8';
        document.getElementById('fv-price').textContent = 'N/A';
        document.getElementById('fv-discount').textContent = 'P/E-based valuation not applicable';
    } else {
        document.getElementById('fv-price').textContent = 'N/A';
        document.getElementById('fv-discount').textContent = 'Insufficient P/E data';
    }

    // Analyst Consensus
    const ar = sc.analyst_recom;
    const gauge = document.getElementById('analyst-gauge');
    const alabel = document.getElementById('analyst-label');
    if (ar) {
        gauge.textContent = ar.toFixed(1);
        const labels = ['','Strong Buy','Buy','Hold','Sell','Strong Sell'];
        const idx = Math.min(5, Math.max(1, Math.round(ar)));
        alabel.textContent = labels[idx] || 'Hold';
        const colors = ['','#00ff88','#00d4ff','#94a3b8','#ff9500','#ff3b5c'];
        gauge.style.borderColor = colors[idx]; gauge.style.color = colors[idx];
    } else if (isFund) {
        gauge.textContent = '—';
        gauge.style.borderColor = '#94a3b8'; gauge.style.color = '#94a3b8';
        alabel.textContent = 'Fund/ETF — no analyst consensus';
    } else {
        gauge.textContent = 'N/A';
        alabel.textContent = 'No analyst data available';
    }
    const afEl = document.getElementById('analyst-freshness');
    if (afEl) {
        const ts = data.analyst_updated_at;
        afEl.textContent = ts ? 'Updated: ' + ts.substring(0, 10) : '';
    }

    // Technical Summary
    const tech = data.technical;
    if (tech) {
        document.getElementById('ts-buy').textContent = tech.buy || 0;
        document.getElementById('ts-neutral').textContent = tech.neutral || 0;
        document.getElementById('ts-sell').textContent = tech.sell || 0;
        const ov = document.getElementById('ts-overall');
        ov.textContent = tech.overall || 'NEUTRAL';
        if (tech.overall==='BUY'){ov.style.background='rgba(0,255,136,0.1)';ov.style.color='#00ff88';}
        else if(tech.overall==='SELL'){ov.style.background='rgba(255,59,92,0.1)';ov.style.color='#ff3b5c';}
        else{ov.style.background='rgba(148,163,184,0.1)';ov.style.color='#94a3b8';}
        const sigColors = {'BUY':'#00ff88','SELL':'#ff3b5c','NEUTRAL':'#64748b'};
        const techTips = {
            'RSI(14)': 'Relative Strength Index 0-100. Below 30 = oversold (potential buy). Above 70 = overbought (potential sell). 50 = neutral.',
            'SMA 50':  '% above/below the 50-day moving average. Positive = price above trend (bullish). Negative = below trend (bearish).',
            'SMA 200': '% above/below the 200-day moving average. The long-term trend indicator. Positive = long-term bullish.',
            '52W High':'% below the 52-week high. Near 0% = at or near yearly peak. More negative = further from high.',
            '52W Low': '% above the 52-week low. Higher number = stronger recovery from yearly floor.',
        };
        document.getElementById('ts-signals').innerHTML = (tech.signals||[]).map(s =>
            `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)" title="${techTips[s.name]||''}">
                <span style="color:var(--muted2)">${s.name}${techTips[s.name] ? ' <span class=\'score-q\' style=\'cursor:help\'>?</span>' : ''}</span>
                <span style="font-family:var(--mono);font-size:10px">
                    <span style="color:var(--muted)">${s.value}</span>
                    <span style="color:${sigColors[s.signal]||'#94a3b8'};margin-left:6px;font-weight:700">${s.signal}</span>
                </span>
            </div>`
        ).join('');
    }

    initRadarChart(s, lr);
    loadEventFeed();
    initCollapsibleCards();
    setTimeout(() => initTradingViewChart(TICKER, 'D'), 100);
}

async function loadEventFeed() {
    try {
        const res = await fetch(`/api/ticker/${TICKER}/events`);
        const data = await res.json();
        const events = data.events || [];
        const body = document.getElementById('event-feed-body');
        if (!body) return;
        if (!events.length) {
            body.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:12px 0">No events recorded yet.</div>';
            return;
        }
        const dotColor = (e) => {
            if (e.direction === 'up')   return '#00ff88';
            if (e.direction === 'down') return '#ff3b5c';
            return '#4a6380';
        };
        const tagMap = {rating:'event-tag-rating',insider:'event-tag-insider',legal:'event-tag-legal',earnings:'event-tag-earnings'};
        body.innerHTML = events.map((e, i) => `
            <div class="event-item">
                <div class="event-spine">
                    <div class="event-dot" style="border-color:${dotColor(e)};background:${dotColor(e)}22"></div>
                    <div class="event-line"></div>
                </div>
                <div class="event-body">
                    <div class="event-title">
                        <span class="event-tag ${tagMap[e.type]||''}">${e.type}</span>${e.title}
                    </div>
                    ${e.detail ? `<div class="event-detail">${e.detail}</div>` : ''}
                    <div class="event-date">${e.date||''}</div>
                </div>
            </div>`).join('');
    } catch(err) {
        const body = document.getElementById('event-feed-body');
        if (body) body.innerHTML = '<div style="color:var(--muted2);font-size:12px">Could not load events.</div>';
    }
}

function initRadarChart(s, lr) {
    const legalMap = {NONE:100, MINOR:80, CLASS_ACTION:55, SEC_INVESTIGATION:35, SEC_ENFORCEMENT:15, CRIMINAL:5};
    const legalScore = legalMap[lr.risk_level] ?? 80;
    const valueScore = Math.max(0, Math.min(100, 50 + (s.target_upside || 0) * 1.5));
    const mom  = s.momentum_score  || 0;
    const qual = s.quality_score   || 0;
    const ins  = s.insider_score   || 0;
    const rev  = s.reversion_score || 0;

    const scoreColor = v => v >= 70 ? '#00ff88' : v >= 55 ? '#00d4ff' : v >= 40 ? '#ff9500' : '#ff3b5c';
    const fmtS = v => v !== null && v !== undefined ? v.toFixed(1) : '-';

    document.getElementById('rd-momentum').textContent  = fmtS(mom);
    document.getElementById('rd-momentum').style.color  = scoreColor(mom);
    document.getElementById('rd-quality').textContent   = fmtS(qual);
    document.getElementById('rd-quality').style.color   = scoreColor(qual);
    document.getElementById('rd-insider').textContent   = fmtS(ins);
    document.getElementById('rd-insider').style.color   = scoreColor(ins);
    document.getElementById('rd-reversion').textContent = fmtS(rev);
    document.getElementById('rd-reversion').style.color = scoreColor(rev);
    document.getElementById('rd-legal').textContent     = lr.risk_label || '-';
    document.getElementById('rd-legal').style.color     = lr.risk_color || '#94a3b8';
    document.getElementById('rd-value').textContent     = fmtS(Math.round(valueScore * 10) / 10);
    document.getElementById('rd-value').style.color     = scoreColor(valueScore);

    const centerEl = document.getElementById('radar-center-num');
    centerEl.textContent = s.composite_score ? s.composite_score.toFixed(1) : '-';
    centerEl.style.color = scoreColor(s.composite_score || 0);

    const ctx = document.getElementById('radar-chart');
    if (!ctx) return;

    const data = [mom, qual, ins, rev, legalScore, valueScore];
    const gradient = ctx.getContext('2d');

    const fillGrad = gradient.createLinearGradient(0, 0, 0, 280);
    fillGrad.addColorStop(0, 'rgba(0,212,255,0.25)');
    fillGrad.addColorStop(1, 'rgba(0,255,136,0.08)');

    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Momentum', 'Quality', 'Insider', 'Reversion', 'Legal', 'Value'],
            datasets: [{
                data,
                fill: true,
                backgroundColor: fillGrad,
                borderColor: 'rgba(0,212,255,0.85)',
                borderWidth: 2,
                pointBackgroundColor: ['#00d4ff','#00ff88','#af52de','#facc15','#ff9500','#ff6b35'],
                pointBorderColor: '#080c14',
                pointBorderWidth: 2,
                pointRadius: 5,
                pointHoverRadius: 7,
            }]
        },
        options: {
            responsive: false,
            animation: { duration: 900, easing: 'easeOutQuart' },
            scales: {
                r: {
                    min: 0, max: 100,
                    ticks: {
                        stepSize: 25,
                        display: false,
                    },
                    grid: { color: 'rgba(26,45,69,0.7)' },
                    angleLines: { color: 'rgba(26,45,69,0.7)' },
                    pointLabels: {
                        color: '#8aa4bf',
                        font: { family: "'Space Mono', monospace", size: 9 },
                        padding: 8,
                    },
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#0a1628',
                    borderColor: '#1a2d45',
                    borderWidth: 1,
                    titleColor: '#00d4ff',
                    bodyColor: '#e2eaf4',
                    titleFont: { family: "'Space Mono', monospace", size: 10 },
                    bodyFont: { family: "'Space Mono', monospace", size: 11 },
                    callbacks: {
                        label: ctx => ` ${ctx.raw.toFixed(1)} / 100`,
                    }
                }
            }
        }
    });
}

function initCollapsibleCards() {
    document.getElementById('page-toolbar').style.display = 'flex';

    // Price chart card — manual collapse (separate structure from .card)
    const chartCard = document.getElementById('price-chart-card');
    const chartChevron = document.getElementById('chart-chevron');
    const chartContainer = document.getElementById('tv-chart-container');
    if (chartCard && chartChevron && chartContainer) {
        const chartKey = 'wgt_price_chart';
        const chartBody = chartContainer;
        chartBody.style.overflow = 'hidden';
        chartBody.style.transition = 'max-height 0.3s ease, opacity 0.3s ease';
        chartBody.style.maxHeight = '2000px';
        if (localStorage.getItem(chartKey) === 'collapsed') {
            chartBody.style.maxHeight = '0';
            chartBody.style.opacity = '0';
            chartChevron.style.transform = 'rotate(-90deg)';
        }
        chartCard.querySelector('.chart-header').addEventListener('click', function(e) {
            if (e.target.classList.contains('interval-btn')) return;
            const collapsed = chartBody.style.maxHeight === '0px';
            if (collapsed) {
                chartBody.style.maxHeight = '2000px';
                chartBody.style.opacity = '1';
                chartChevron.style.transform = '';
                localStorage.setItem(chartKey, 'expanded');
            } else {
                chartBody.style.maxHeight = '0';
                chartBody.style.opacity = '0';
                chartChevron.style.transform = 'rotate(-90deg)';
                localStorage.setItem(chartKey, 'collapsed');
            }
        });
    }

    document.querySelectorAll('#page-content .card').forEach(card => {
        const title = card.querySelector('.card-title');
        if (!title) return;

        // Wrap non-title content in card-body
        const body = document.createElement('div');
        body.className = 'card-body';
        Array.from(card.children).forEach(child => {
            if (!child.classList.contains('card-title')) body.appendChild(child);
        });
        card.appendChild(body);

        // Add chevron to title
        const chevron = document.createElement('span');
        chevron.className = 'chevron';
        chevron.textContent = '▾';
        title.style.display = 'flex';
        title.style.alignItems = 'center';
        title.appendChild(chevron);

        // Restore from localStorage
        const key = 'wgt_' + (title.textContent.trim().replace(/[^a-z0-9]/gi,'_').toLowerCase());
        card._wgtKey = key;
        if (localStorage.getItem(key) === 'collapsed') {
            card.classList.add('card-collapsed');
        }

        title.addEventListener('click', () => {
            card.classList.toggle('card-collapsed');
            localStorage.setItem(key, card.classList.contains('card-collapsed') ? 'collapsed' : 'expanded');
        });
    });
}

function toggleAllCards() {
    const btn = document.getElementById('btn-collapse-all');
    const cards = document.querySelectorAll('#page-content .card');
    const anyExpanded = [...cards].some(c => !c.classList.contains('card-collapsed'));
    cards.forEach(card => {
        if (anyExpanded) {
            card.classList.add('card-collapsed');
            if (card._wgtKey) localStorage.setItem(card._wgtKey, 'collapsed');
        } else {
            card.classList.remove('card-collapsed');
            if (card._wgtKey) localStorage.setItem(card._wgtKey, 'expanded');
        }
    });
    btn.textContent = anyExpanded ? 'Expand All' : 'Collapse All';
}

loadPage();
</script>

<!-- tip-box must be in DOM before the tooltip IIFE below -->
<div id="tip-box" style="position:fixed;display:none;background:#0a1628;border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:5px;font-family:var(--sans);font-size:11px;line-height:1.45;max-width:240px;z-index:9999;pointer-events:none;word-wrap:break-word;box-shadow:0 4px 16px rgba(0,0,0,0.4)"></div>

<script>
// Floating tooltip — #tip-box must exist before this IIFE runs,
// so it is inserted above this script block in the HTML.
(function(){
    const box = document.getElementById('tip-box');
    if (!box) return;
    document.addEventListener('mouseover', function(e) {
        const el = e.target.closest('[data-tip]');
        if (el) { box.textContent = el.dataset.tip; box.style.display = 'block'; }
    });
    document.addEventListener('mousemove', function(e) {
        if (box.style.display === 'block') {
            box.style.left = Math.min(e.clientX+14, window.innerWidth-246)+'px';
            box.style.top  = Math.max(e.clientY-44, 4)+'px';
        }
    });
    document.addEventListener('mouseout', function(e) {
        if (e.target.closest('[data-tip]')) box.style.display = 'none';
    });
})();
</script>
