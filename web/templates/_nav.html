<style>
/* ── Shared Navigation ──────────────────────── */
header{position:sticky;top:0;z-index:100;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;
    justify-content:space-between;height:56px;}
.logo{font-family:var(--mono);font-size:15px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;text-decoration:none;flex-shrink:0;}
.logo span{color:var(--accent2);}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.live-dot{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--muted2);white-space:nowrap;}
.live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);animation:livepulse 2s infinite;flex-shrink:0;}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-ts{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;}
.nav-sep{width:1px;height:14px;background:var(--border);flex-shrink:0;}
.nav-user{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}
.nav-link{font-family:var(--mono);font-size:11px;color:var(--muted2);text-decoration:none;transition:color .15s;white-space:nowrap;}
.nav-link:hover,.nav-link.active{color:var(--accent);}
.nav-btn{font-family:var(--mono);font-size:11px;color:var(--muted2);background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn:hover{color:var(--accent);border-color:var(--accent);}
.nav-tier{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.nav-tier-free{color:#64748b;border:1px solid #64748b;}
.nav-tier-starter{color:#3b82f6;border:1px solid #3b82f6;}
.nav-tier-pro{color:#a855f7;border:1px solid #a855f7;}
.nav-tier-elite{color:#00ff88;border:1px solid rgba(0,255,136,.45);}
</style>
<header>
    <a href="/" class="logo">SIGNAL<span>INTEL</span></a>
    {% include '_search.html' %}
    <div class="header-right">
        <div class="live-dot">LIVE</div>
        <span class="nav-ts" id="last-updated"></span>
        <span class="nav-user">{{ user.username if user else '' }}</span>
        {% if user %}<span class="nav-tier nav-tier-{{ user.tier or 'free' }}">{{ (user.tier or 'free')|upper }}</span>{% endif %}
        <div class="nav-sep"></div>
        <a href="/" class="nav-link{{ ' active' if request.path == '/' else '' }}">Dashboard</a>
        <a href="/ratings" class="nav-link{{ ' active' if request.path == '/ratings' else '' }}">Signal Tiers</a>
        <a href="/screener" class="nav-link{{ ' active' if request.path == '/screener' else '' }}">Screener</a>
        <a href="/earnings" class="nav-link{{ ' active' if request.path == '/earnings' else '' }}">Earnings</a>
        <a href="/dividends" class="nav-link{{ ' active' if request.path == '/dividends' else '' }}">Dividends</a>
        <a href="/events" class="nav-link{{ ' active' if request.path == '/events' else '' }}">Events</a>
        <a href="/markets" class="nav-link{{ ' active' if request.path == '/markets' else '' }}">Markets</a>
        <a href="/watchlist" class="nav-link{{ ' active' if request.path == '/watchlist' else '' }}">Watchlist</a>
        <a href="/backtest" class="nav-link{{ ' active' if request.path == '/backtest' else '' }}">Backtest</a>
        <div class="nav-sep"></div>
        <a href="/logout" class="nav-link">Sign out</a>
    </div>
</header>
<style>
/* Toast — must live outside header to avoid backdrop-filter fixed-positioning bug */
#wl-toast{position:fixed;bottom:24px;right:24px;z-index:99999;
    background:#0a1628;border:1px solid rgba(0,255,136,0.35);border-radius:8px;
    padding:12px 18px;font-family:var(--mono,monospace);font-size:12px;
    color:#e2eaf4;box-shadow:0 8px 32px rgba(0,0,0,0.5);
    display:none;align-items:center;gap:10px;max-width:340px;cursor:pointer;
    transition:opacity 0.3s;}
#wl-toast .toast-icon{color:#00ff88;font-size:14px;flex-shrink:0;}
#wl-toast .toast-msg{flex:1;line-height:1.4;}
#wl-toast .toast-link{color:#00d4ff;text-decoration:none;white-space:nowrap;}
</style>
<div id="wl-toast" onclick="this.style.display='none'">
    <span class="toast-icon">✓</span>
    <span class="toast-msg" id="wl-toast-msg"></span>
</div>
{% include '_watchlist_picker.html' %}
