<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalIntel — Markets</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--surface:#0d1520;--surface2:#111d2e;--border:#1a2d45;
    --accent:#00d4ff;--accent2:#00ff88;--warning:#ff9500;--danger:#ff3b5c;
    --text:#f0f6ff;--muted:#8aa4bf;--muted2:#c2d4e8;
    --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;
    background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;}

/* ── Sessions bar ────────────────────────────────────────────────────── */
.sessions-bar{background:rgba(13,21,32,0.95);border-bottom:1px solid var(--border);
    padding:0 24px;height:48px;display:flex;align-items:center;}
.sessions-inner{display:flex;align-items:center;gap:0;width:100%;max-width:1600px;}
.session-pulse{display:flex;align-items:center;gap:10px;padding:0 24px;
    flex:1;border-right:1px solid var(--border);}
.session-pulse:first-child{padding-left:0;}
.session-pulse:last-child{border-right:none;}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:sess-pulse 2s infinite;}
.sess-dot.dot-green{background:#00ff88;box-shadow:0 0 8px #00ff88;}
.sess-dot.dot-red{background:#ff3b5c;box-shadow:0 0 6px rgba(255,59,92,0.5);animation:none;}
.sess-dot.dot-amber{background:#ff9500;box-shadow:0 0 8px #ff9500;}
@keyframes sess-pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sess-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sess-city{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);letter-spacing:0.5px;}
.sess-exchange{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.5px;}
.sess-time{font-family:var(--mono);font-size:12px;color:var(--accent);min-width:38px;}
.sess-status{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;
    border-radius:3px;letter-spacing:1px;white-space:nowrap;}
.sess-status.status-green{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.25);}
.sess-status.status-red{background:rgba(255,59,92,0.08);color:#ff3b5c;border:1px solid rgba(255,59,92,0.2);}
.sess-status.status-amber{background:rgba(255,149,0,0.1);color:#ff9500;border:1px solid rgba(255,149,0,0.2);}
.sess-until{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;}

/* ── Tab bar ─────────────────────────────────────────────────────────── */
.tab-bar{display:flex;gap:4px;padding:10px 24px;border-bottom:1px solid var(--border);
    background:rgba(8,12,20,0.8);}
.mkt-tab{padding:6px 18px;border-radius:4px;font-size:11px;font-weight:500;
    letter-spacing:0.5px;cursor:pointer;border:1px solid transparent;
    color:var(--muted);transition:all 0.15s;font-family:var(--mono);
    text-transform:uppercase;background:transparent;}
.mkt-tab:hover{color:var(--text);border-color:var(--border);}
.mkt-tab.active{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);color:var(--accent);}

/* ── Main content ────────────────────────────────────────────────────── */
main{padding:20px 24px;max-width:1700px;margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── Chart grid ──────────────────────────────────────────────────────── */
.charts-grid{display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:12px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    overflow:hidden;transition:border-color 0.15s;}
.chart-card:hover{border-color:rgba(0,212,255,0.3);}
.card-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:1px;color:var(--muted2);padding:10px 12px 4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tradingview-widget-container{display:block;}
.tradingview-widget-container__widget{min-height:180px;}
</style>
</head>
<body>
{% include '_nav.html' %}

<!-- ── Market Sessions Bar ──────────────────────────────────────────────── -->
<div class="sessions-bar">
    <div class="sessions-inner" id="sessions-inner">
        <!-- populated by loadSessions() -->
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);">Loading sessions…</div>
    </div>
</div>

<!-- ── Tab Navigation ────────────────────────────────────────────────────── -->
<div class="tab-bar">
    <button class="mkt-tab active" data-tab="indices"   onclick="switchTab('indices')">🌍 Major Indices</button>
    <button class="mkt-tab"        data-tab="sectors"   onclick="switchTab('sectors')">📊 S&amp;P Sectors</button>
    <button class="mkt-tab"        data-tab="currencies"onclick="switchTab('currencies')">💱 Currencies</button>
    <button class="mkt-tab"        data-tab="crypto"    onclick="switchTab('crypto')">₿ Crypto Top 10</button>
</div>

<main>
    <div id="panel-indices"    class="tab-panel active"><div class="charts-grid" id="grid-indices"></div></div>
    <div id="panel-sectors"    class="tab-panel"><div class="charts-grid" id="grid-sectors"></div></div>
    <div id="panel-currencies" class="tab-panel"><div class="charts-grid" id="grid-currencies"></div></div>
    <div id="panel-crypto"     class="tab-panel"><div class="charts-grid" id="grid-crypto"></div></div>
</main>

<script>
// Symbol lists passed from Flask/Jinja2
const TAB_DATA = {
    indices:    {{ indices    | tojson }},
    sectors:    {{ sectors    | tojson }},
    currencies: {{ currencies | tojson }},
    crypto:     {{ crypto     | tojson }},
};

// Widget config (applied to every mini chart)
const WIDGET_CFG = {
    width:       '100%',
    height:      200,
    locale:      'en',
    dateRange:   '3M',
    colorTheme:  'dark',
    isTransparent: true,
    autosize:    false,
    largeChartUrl: '',
    chartOnly:   false,
    noTimeScale: false,
};

// ── Lazy widget init ──────────────────────────────────────────────────────
function initGrid(tabId) {
    const grid = document.getElementById('grid-' + tabId);
    if (!grid || grid.dataset.inited) return;
    grid.dataset.inited = '1';

    TAB_DATA[tabId].forEach(({label, symbol}) => {
        // Card wrapper
        const card = document.createElement('div');
        card.className = 'chart-card';

        // Label
        const lbl = document.createElement('div');
        lbl.className = 'card-label';
        lbl.textContent = label;
        card.appendChild(lbl);

        // TradingView widget container
        const tvContainer = document.createElement('div');
        tvContainer.className = 'tradingview-widget-container';
        const tvWidget = document.createElement('div');
        tvWidget.className = 'tradingview-widget-container__widget';
        tvContainer.appendChild(tvWidget);

        // Embed script — TradingView reads textContent as JSON config
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
        script.async = true;
        script.text = JSON.stringify({...WIDGET_CFG, symbol});
        tvContainer.appendChild(script);

        card.appendChild(tvContainer);
        grid.appendChild(card);
    });
}

// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(tabId) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.mkt-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tabId).classList.add('active');
    document.querySelector(`.mkt-tab[data-tab="${tabId}"]`).classList.add('active');
    initGrid(tabId);
}

// ── Market sessions bar ──────────────────────────────────────────────────
function colorClass(color) {
    return {'green':'status-green','red':'status-red','amber':'status-amber'}[color] || 'status-red';
}

async function loadSessions() {
    const data = await fetch('/api/market-sessions').then(r => r.json()).catch(() => null);
    if (!data) return;
    document.getElementById('sessions-inner').innerHTML = data.map(s => `
        <div class="session-pulse">
            <span class="sess-dot dot-${s.color}"></span>
            <div class="sess-info">
                <span class="sess-city">${s.city}</span>
                <span class="sess-exchange">${s.exchange}</span>
                <span class="sess-time">${s.local_time}</span>
                <span class="sess-status ${colorClass(s.color)}">${s.status}</span>
                <span class="sess-until">${s.next_change_label} in ${s.until_next_change}</span>
            </div>
        </div>
    `).join('');
}

// ── Boot ─────────────────────────────────────────────────────────────────
initGrid('indices');   // first tab loads immediately
loadSessions();
setInterval(loadSessions, 60000);
</script>

{% include '_footer.html' %}
</body>
</html>
