<div class="search-wrap" id="search-wrap">
    <input type="text" id="global-search" class="search-input"
           placeholder="Search tickers… (/)" autocomplete="off" spellcheck="false">
    <div class="search-drop" id="search-drop"></div>
</div>
<style>
.search-wrap{position:relative;width:240px;flex-shrink:0;}
.search-input{width:100%;background:var(--surface2,#111d2e);border:1px solid var(--border,#1a2d45);
    border-radius:6px;padding:6px 32px 6px 12px;font-family:var(--mono);font-size:12px;
    color:var(--text,#f0f6ff);outline:none;box-sizing:border-box;transition:border-color 0.15s;}
.search-input:focus{border-color:var(--accent,#00d4ff);}
.search-input::placeholder{color:var(--muted,#8aa4bf);}
.search-drop{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;min-width:320px;
    background:var(--surface,#0d1520);border:1px solid var(--border,#1a2d45);border-radius:6px;
    z-index:9999;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.sdrop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;
    border-bottom:1px solid var(--border,#1a2d45);transition:background 0.1s;}
.sdrop-item:last-child{border-bottom:none;}
.sdrop-item:hover,.sdrop-item.sdrop-active{background:var(--surface2,#111d2e);}
.sdrop-ticker{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent,#00d4ff);min-width:52px;}
.sdrop-company{font-size:11px;color:var(--muted2,#c2d4e8);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sdrop-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.sdrop-score{font-family:var(--mono);font-size:11px;color:var(--muted2,#c2d4e8);min-width:32px;text-align:right;flex-shrink:0;}
.sdrop-target{font-family:var(--mono);font-size:10px;min-width:90px;text-align:right;flex-shrink:0;}
.sdrop-empty{padding:10px 12px;font-size:12px;color:var(--muted,#8aa4bf);font-family:var(--mono);}
.sdrop-section-header{padding:6px 12px 4px;font-family:var(--mono);font-size:9px;text-transform:uppercase;
    letter-spacing:1px;color:var(--muted,#8aa4bf);background:var(--surface2,#111d2e);
    border-bottom:1px solid var(--border,#1a2d45);}

/* Toast notification */
#wl-toast{position:fixed;bottom:24px;right:24px;z-index:99999;
    background:#0a1628;border:1px solid rgba(0,255,136,0.35);border-radius:8px;
    padding:12px 18px;font-family:var(--mono,monospace);font-size:12px;
    color:#e2eaf4;box-shadow:0 8px 32px rgba(0,0,0,0.5);
    display:none;align-items:center;gap:10px;max-width:340px;cursor:pointer;
    transition:opacity 0.3s;}
#wl-toast .toast-icon{color:#00ff88;font-size:14px;flex-shrink:0;}
#wl-toast .toast-msg{flex:1;line-height:1.4;}
#wl-toast .toast-link{color:#00d4ff;text-decoration:none;white-space:nowrap;}
</style>
<!-- Toast notification element (shared across all pages) -->
<div id="wl-toast" onclick="this.style.display='none'">
    <span class="toast-icon">✓</span>
    <span class="toast-msg" id="wl-toast-msg"></span>
</div>

<script>
// ── Global toast function ─────────────────────────────────
window.showWlToast = function(ticker, removed) {
    const toast = document.getElementById('wl-toast');
    const msg   = document.getElementById('wl-toast-msg');
    if (!toast || !msg) return;
    if (removed) {
        msg.innerHTML = `${ticker} removed from watchlist`;
        toast.style.borderColor = 'rgba(255,59,92,0.35)';
    } else {
        msg.innerHTML = `${ticker} added to My Watchlist &nbsp;<a class="toast-link" href="/watchlist">View Watchlist →</a>`;
        toast.style.borderColor = 'rgba(0,255,136,0.35)';
    }
    toast.style.display = 'flex';
    toast.style.opacity = '1';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => { toast.style.display = 'none'; toast.style.opacity = '1'; }, 350);
    }, 4000);
};

// ── Recently viewed tracker ───────────────────────────────
window.trackRecentlyViewed = function(ticker) {
    try {
        let recent = JSON.parse(localStorage.getItem('si_recent') || '[]');
        recent = [ticker, ...recent.filter(t => t !== ticker)].slice(0, 10);
        localStorage.setItem('si_recent', JSON.stringify(recent));
    } catch(e) {}
};

// Track current page if on a ticker URL
(function() {
    const m = location.pathname.match(/^\/ticker\/([A-Z0-9.]+)$/i);
    if (m) window.trackRecentlyViewed(m[1].toUpperCase());
})();


(function(){
    const input = document.getElementById('global-search');
    const drop  = document.getElementById('search-drop');
    if (!input || !drop) return;
    let timer = null, activeIdx = -1, results = [];

    const RC = {
        STRONG_BUY:'#00ff88', BUY:'#00d4ff', STRONG_HOLD:'#94a3b8',
        HOLD:'#64748b', WEAK_HOLD:'#ff9500', SELL:'#ff3b5c', STRONG_SELL:'#ff3b5c'
    };
    const TIER_SHORT = {STRONG_BUY:'Very Strong',BUY:'Strong',STRONG_HOLD:'Stable',HOLD:'Neutral',WEAK_HOLD:'Soft',SELL:'Bearish',STRONG_SELL:'Very Bearish'};

    function clear() {
        drop.innerHTML = '';
        drop.style.display = 'none';
        activeIdx = -1;
        results = [];
    }

    function go(ticker) {
        window.location.href = '/ticker/' + ticker.toUpperCase();
    }

    function render(items) {
        results = items;
        if (!items.length) {
            drop.innerHTML = '<div class="sdrop-empty">No results</div>';
            drop.style.display = 'block';
            return;
        }
        drop.innerHTML = items.map((r, i) => {
            const c     = RC[r.rating] || '#8aa4bf';
            const label = TIER_SHORT[r.rating] || '';
            const score = r.composite_score != null ? Number(r.composite_score).toFixed(1) : '';
            let targetHtml = '';
            if (r.target_price != null) {
                const upside = r.target_upside != null ? Number(r.target_upside) : null;
                const uc = upside == null ? '#8aa4bf' : upside >= 0 ? '#00ff88' : '#ff3b5c';
                const us = upside != null ? (upside >= 0 ? '+' : '') + upside.toFixed(1) + '%' : '';
                targetHtml = `<span class="sdrop-target"><span style="color:#c2d4e8">$${Number(r.target_price).toFixed(2)}</span>${us ? ` <span style="color:${uc}">${us}</span>` : ''}</span>`;
            }
            return `<div class="sdrop-item" data-ticker="${r.ticker}" data-idx="${i}">
                <span class="sdrop-ticker">${r.ticker}</span>
                <span class="sdrop-company">${r.company || ''}</span>
                ${label ? `<span class="sdrop-badge" style="color:${c};background:${c}22">${label}</span>` : ''}
                <span class="sdrop-score">${score}</span>
                ${targetHtml}
            </div>`;
        }).join('');
        drop.querySelectorAll('.sdrop-item').forEach(el => {
            el.addEventListener('mousedown', e => {
                e.preventDefault();
                go(el.dataset.ticker);
            });
        });
        drop.style.display = 'block';
    }

    function highlight() {
        drop.querySelectorAll('.sdrop-item').forEach((el, i) => {
            el.classList.toggle('sdrop-active', i === activeIdx);
        });
    }

    async function showPrePopulated() {
        const sections = [];
        try {
            const [wl, signals] = await Promise.all([
                fetch('/api/watchlist').then(r => r.json()).catch(() => []),
                fetch('/api/signals?sort=composite_score&dir=desc&per_page=3&rating=STRONG_BUY').then(r => r.json()).catch(() => ({rows:[]})),
            ]);
            const recent = (() => {
                try { return JSON.parse(localStorage.getItem('si_recent') || '[]'); } catch(e) { return []; }
            })();

            const renderItem = (r, i) => {
                const c = RC[r.rating] || '#8aa4bf';
                const label = (r.rating || '').replace(/_/g, ' ');
                const score = r.composite_score != null ? Number(r.composite_score).toFixed(1) : '';
                return `<div class="sdrop-item" data-ticker="${r.ticker}" data-idx="${i}">
                    <span class="sdrop-ticker">${r.ticker}</span>
                    <span class="sdrop-company">${r.company || ''}</span>
                    ${label ? `<span class="sdrop-badge" style="color:${c};background:${c}22">${label}</span>` : ''}
                    <span class="sdrop-score">${score}</span>
                </div>`;
            };

            let html = '';
            const wlSlice = (wl || []).slice(0, 5);
            if (wlSlice.length) {
                html += '<div class="sdrop-section-header">Your Watchlist</div>';
                html += wlSlice.map((r, i) => renderItem({ticker:r.ticker, rating:r.rating, composite_score:r.composite_score, company:r.company}, i)).join('');
            }

            const topSigs = (signals.rows || signals || []).slice(0, 3);
            if (topSigs.length) {
                html += '<div class="sdrop-section-header">Today\'s Top Signals</div>';
                html += topSigs.map((r, i) => renderItem(r, wlSlice.length + i)).join('');
            }

            const recentSlice = recent.slice(0, 5);
            if (recentSlice.length) {
                html += '<div class="sdrop-section-header">Recently Viewed</div>';
                html += recentSlice.map((t, i) => `<div class="sdrop-item" data-ticker="${t}" data-idx="${wlSlice.length + topSigs.length + i}">
                    <span class="sdrop-ticker">${t}</span>
                    <span class="sdrop-company" style="color:var(--muted,#8aa4bf)">Recently viewed</span>
                </div>`).join('');
            }

            if (!html) return;
            drop.innerHTML = html;
            drop.querySelectorAll('.sdrop-item').forEach(el => {
                el.addEventListener('mousedown', e => { e.preventDefault(); go(el.dataset.ticker); });
            });
            drop.style.display = 'block';
        } catch(e) {}
    }

    input.addEventListener('focus', function() {
        if (!this.value.trim()) showPrePopulated();
    });

    input.addEventListener('input', function() {
        clearTimeout(timer);
        const q = this.value.trim();
        if (!q) { showPrePopulated(); return; }
        timer = setTimeout(() => {
            fetch('/api/search?q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(d => render(d.results || []))
                .catch(() => clear());
        }, 150);
    });

    input.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = Math.min(activeIdx + 1, results.length - 1);
            highlight();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = Math.max(activeIdx - 1, -1);
            highlight();
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIdx >= 0 && results[activeIdx]) {
                go(results[activeIdx].ticker);
            } else if (this.value.trim()) {
                go(this.value.trim());
            }
        } else if (e.key === 'Escape') {
            clear();
            this.blur();
        }
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('#search-wrap')) clear();
    });

    // Press '/' anywhere (outside inputs) to focus the search bar
    document.addEventListener('keydown', function(e) {
        if (e.key === '/' &&
            document.activeElement.tagName !== 'INPUT' &&
            document.activeElement.tagName !== 'TEXTAREA') {
            e.preventDefault();
            input.focus();
            input.select();
        }
    });
})();
</script>
